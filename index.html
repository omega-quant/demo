<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Runner</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: skyblue;
}

#gameContainer {
    position: relative;
    width: 350px;
    height: 600px;
}

canvas {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 1;
}

/* OVERLAY */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 10;
    background: rgba(0,0,0,0.7);
    color: white;

    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.hidden {
    display: none;
}

button {
    padding: 12px 20px;
    font-size: 18px;
    margin-top: 15px;
    border: none;
    border-radius: 8px;
    background: pink;
    cursor: pointer;
}

#score {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 5;
    font-size: 20px;
}
</style>
</head>

<body>

<div id="gameContainer">

    <canvas id="gameCanvas"></canvas>

    <div id="startScreen" class="overlay">
        <h1>❤️ Love Runner ❤️</h1>
        <button id="playBtn">Play</button>
    </div>

    <div id="gameOverScreen" class="overlay hidden">
        <h1 id="finalText">Game Over</h1>
        <button id="restartBtn">Restart</button>
    </div>

    <div id="score">0</div>

</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = 350;
canvas.height = 600;

const startScreen = document.getElementById("startScreen");
const gameOverScreen = document.getElementById("gameOverScreen");
const playBtn = document.getElementById("playBtn");
const restartBtn = document.getElementById("restartBtn");
const scoreDisplay = document.getElementById("score");
const finalText = document.getElementById("finalText");

// IMAGES
const playerImg = new Image();
playerImg.src = "player.png";

const gfImg = new Image();
gfImg.src = "gf.png";

const bambooImg = new Image();
bambooImg.src = "bamboo.png";

// STATE
let gameRunning = false;
let gameOver = false;
let score = 0;

let player = { x: 80, y: 300, width: 50, height: 50, velocity: 0 };
let pipes = [];
let frame = 0;
let pipeSpeed = 1;
let gf = { x: 2000, y: 250, width: 60, height: 60 };

// PHYSICS
let gravity = 0.15;
let jump = -4;

// ✅ PLAY BUTTON (FIXED)
playBtn.onclick = function () {
    console.log("PLAY CLICKED");

    startScreen.classList.add("hidden");

    gameRunning = true;
};

// RESTART
restartBtn.onclick = function () {
    gameOverScreen.classList.add("hidden");
    resetGame();
    gameRunning = true;
};

// TAP CONTROL
canvas.addEventListener("click", function () {
    if (!gameRunning || gameOver) return;
    player.velocity = jump;
});

// RESET
function resetGame() {
    player.y = 300;
    player.velocity = 0;
    pipes = [];
    frame = 0;
    score = 0;
    gameOver = false;
    scoreDisplay.innerText = score;
}

// CREATE PIPE
function createPipe() {
    let gap = 220;
    let gapY = Math.random() * (canvas.height - gap - 100) + 50;

    pipes.push({
        x: canvas.width,
        width: 90,
        gapY,
        gapHeight: gap,
        passed: false
    });
}

// UPDATE
function update() {
    if (!gameRunning || gameOver) return;

    frame++;

    player.velocity += gravity;
    player.y += player.velocity;

    if (frame % 120 === 0) createPipe();

    pipes.forEach(pipe => {
        pipe.x -= pipeSpeed;

        if (!pipe.passed && pipe.x + pipe.width < player.x) {
            pipe.passed = true;
            score++;
            scoreDisplay.innerText = score;
        }

        if (
            player.x < pipe.x + pipe.width &&
            player.x + player.width > pipe.x &&
            (player.y < pipe.gapY ||
             player.y + player.height > pipe.gapY + pipe.gapHeight)
        ) {
            gameOver = true;
            endGame(false);
        }
    });

    if (player.y < 0 || player.y + player.height > canvas.height) {
        gameOver = true;
        endGame(false);
    }

    gf.x -= pipeSpeed;

    if (
        player.x < gf.x + gf.width &&
        player.x + player.width > gf.x &&
        player.y < gf.y + gf.height &&
        player.y + player.height > gf.y
    ) {
        gameOver = true;
        endGame(true);
    }
}

// DRAW
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    pipes.forEach(pipe => {
        ctx.drawImage(bambooImg, pipe.x, 0, pipe.width, pipe.gapY);
        ctx.drawImage(bambooImg, pipe.x, pipe.gapY + pipe.gapHeight, pipe.width, canvas.height);
    });

    ctx.drawImage(gfImg, gf.x, gf.y, gf.width, gf.height);
    ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);
}

// END
function endGame(win) {
    setTimeout(() => {
        gameOverScreen.classList.remove("hidden");
        finalText.innerText = win ? "❤️ You Win ❤️" : "Game Over";
    }, 500);
}

// LOOP
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
