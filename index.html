```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bamboo Love Run</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #111;
  font-family: Arial;
}

canvas {
  display: block;
}

/* UI */
#scoreBox {
  position: fixed;
  top: 10px;
  left: 10px;
  color: white;
  font-size: 20px;
}

#startScreen, #endScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
  gap: 20px;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  background: #00c853;
  color: white;
}

/* Controls */
.controls {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
}

.jumpBtn {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  font-size: 28px;
}
</style>
</head>

<body>

<canvas id="gameCanvas"></canvas>

<div id="scoreBox">Score: <span id="score">0</span></div>

<div id="startScreen">
  <h1>Bamboo Love Run ❤️</h1>
  <button onclick="startGame()">Start</button>
</div>

<div id="endScreen" style="display:none;">
  <h1>❤️ Together Forever ❤️</h1>
  <button onclick="startGame()">Play Again</button>
</div>

<div class="controls">
  <button class="jumpBtn" onclick="jump()">⬆</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* LOAD IMAGES */
const playerImg = new Image();
playerImg.src = "player.png";

const gfImg = new Image();
gfImg.src = "gf.png";

/* PLAYER */
let player = {
  x: 80,
  y: canvas.height / 2,
  w: 50,
  h: 50,
  velocity: 0
};

/* GF (END TARGET) */
let gf = {
  x: canvas.width + 500,
  y: canvas.height / 2,
  w: 60,
  h: 60
};

/* GAME SETTINGS */
let gravity = 0.5;
let jumpForce = -10;

let bamboos = [];
let bambooWidth = 80;   // FIXED (not slim anymore)
let gapHeight = 200;    // FIXED (passable gap)
let speed = 3;

let score = 0;
let running = false;
let gameEnded = false;

/* CREATE BAMBOO */
function createBamboo() {
  let gapTop = Math.random() * (canvas.height - gapHeight - 100) + 50;

  bamboos.push({
    x: canvas.width,
    gapTop: gapTop,
    gapBottom: gapTop + gapHeight,
    passed: false
  });
}

/* UPDATE */
function update() {
  if (!running) return;

  player.velocity += gravity;
  player.y += player.velocity;

  if (player.y < 0 || player.y + player.h > canvas.height) {
    endGame();
  }

  /* BAMBOOS */
  bamboos.forEach(b => {
    b.x -= speed;

    if (!b.passed && b.x + bambooWidth < player.x) {
      score++;
      b.passed = true;
      document.getElementById("score").innerText = score;
    }

    if (
      player.x < b.x + bambooWidth &&
      player.x + player.w > b.x &&
      (player.y < b.gapTop || player.y + player.h > b.gapBottom)
    ) {
      endGame();
    }
  });

  bamboos = bamboos.filter(b => b.x > -bambooWidth);

  if (bamboos.length === 0 || bamboos[bamboos.length - 1].x < canvas.width - 300) {
    createBamboo();
  }

  /* GF APPROACH */
  gf.x -= speed;

  // When player reaches GF → hugging animation
  if (!gameEnded && player.x + player.w >= gf.x) {
    startHug();
  }
}

/* DRAW */
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Player image
  ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);

  // GF image
  ctx.drawImage(gfImg, gf.x, gf.y, gf.w, gf.h);

  // Bamboo
  ctx.fillStyle = "green";
  bamboos.forEach(b => {
    ctx.fillRect(b.x, 0, bambooWidth, b.gapTop);
    ctx.fillRect(b.x, b.gapBottom, bambooWidth, canvas.height);
  });
}

/* LOOP */
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

/* CONTROLS */
function jump() {
  if (!running) return;
  player.velocity = jumpForce;
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") jump();
});

/* START GAME */
function startGame() {
  player.y = canvas.height / 2;
  player.velocity = 0;

  gf.x = canvas.width + 500;

  bamboos = [];
  score = 0;
  speed = 3;

  document.getElementById("score").innerText = score;

  document.getElementById("startScreen").style.display = "none";
  document.getElementById("endScreen").style.display = "none";

  running = true;
  gameEnded = false;
}

/* END GAME (FAIL) */
function endGame() {
  running = false;
  document.getElementById("endScreen").style.display = "flex";
}

/* HUGGING ANIMATION */
function startHug() {
  running = false;
  gameEnded = true;

  let interval = setInterval(() => {
    player.x += 1;
    gf.x -= 1;

    if (Math.abs(player.x - gf.x) < 10) {
      clearInterval(interval);

      // Show end screen after hug
      setTimeout(() => {
        document.getElementById("endScreen").style.display = "flex";
      }, 800);
    }
  }, 10);
}

/* RESIZE */
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
